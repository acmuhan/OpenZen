<!doctype html>
<html lang="zh-cmn-Hans">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no">
  <title>Zen WebPanel</title>
  <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
*,
::after,
::before {
  box-sizing: border-box
}

:root {
  --accent: #7c6af7;
  --accent2: #c084fc;
  --success: #34d399;
  --danger: #f87171;
  --bg: #07070d;
  --surface: #0e0e18;
  --panel: #13131e;
  --card: #15151f;
  --border: #1c1c2a;
  --text: #d4d4e8;
  --muted: #4a4a6a;
  --faint: #252535
}

html {
  scroll-behavior: smooth
}

body {
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  overflow-x: hidden;
  margin: 0
}

::-webkit-scrollbar {
  width: 3px
}

::-webkit-scrollbar-track {
  background: 0 0
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent)
}

#bg-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: .35
}

#topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 52px;
  z-index: 40;
  background: rgba(7, 7, 13, .88);
  border-bottom: 1px solid rgba(124, 106, 247, .12);
  backdrop-filter: blur(20px) saturate(1.4);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  animation: topbarIn .5s cubic-bezier(.22, 1, .36, 1) both
}

@keyframes topbarIn {
  from {
    transform: translateY(-100%);
    opacity: 0
  }

  to {
    transform: translateY(0);
    opacity: 1
  }
}

.logo-mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Syne, sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: #fff;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  animation: logoPulse 3s ease-in-out infinite
}

@keyframes logoPulse {

  0%,
  100% {
    box-shadow: 0 0 0 0 rgba(124, 106, 247, 0)
  }

  50% {
    box-shadow: 0 0 0 6px rgba(124, 106, 247, .15)
  }
}

.logo-mark::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255, 255, 255, .18) 0, transparent 60%)
}

#sidebar {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 220px;
  z-index: 20;
  background: var(--surface);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform .35s cubic-bezier(.22, 1, .36, 1);
  display: flex;
  flex-direction: column
}

#sidebar.open {
  transform: translateX(0)
}

#sidebar-head {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0
}

#category {
  padding: 10px 8px;
  flex: 1;
  overflow-y: auto;
  list-style: none;
  margin: 0
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s, color .15s;
  color: var(--muted);
  font-size: 11px;
  text-decoration: none;
  position: relative;
  overflow: hidden
}

.nav-link:hover {
  background: var(--faint);
  color: var(--text)
}

.nav-link.active {
  background: rgba(124, 106, 247, .12);
  color: #fff
}

.nav-link.active .nav-dot {
  background: var(--accent);
  box-shadow: 0 0 6px rgba(124, 106, 247, .6)
}

.nav-link .nav-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .2s, box-shadow .2s;
  flex-shrink: 0
}

.nav-link .nav-ripple {
  position: absolute;
  inset: 0;
  border-radius: 8px;
  background: radial-gradient(circle at var(--rx, 50%) var(--ry, 50%), rgba(124, 106, 247, .2) 0, transparent 60%);
  opacity: 0;
  transition: opacity .4s
}

.nav-link:hover .nav-ripple {
  opacity: 1
}

#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .55);
  z-index: 19;
  backdrop-filter: blur(2px)
}

#sidebar-overlay.open {
  display: block;
  animation: fadeIn .2s ease
}

@keyframes fadeIn {
  from {
    opacity: 0
  }

  to {
    opacity: 1
  }
}

.toggle-wrap {
  position: relative;
  display: inline-flex
}

.toggle-input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0
}

.toggle-track {
  width: 36px;
  height: 20px;
  background: var(--faint);
  border-radius: 999px;
  cursor: pointer;
  position: relative;
  border: 1px solid var(--border);
  transition: background .25s, border-color .25s, box-shadow .25s
}

.toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--muted);
  transition: transform .25s cubic-bezier(.34, 1.56, .64, 1), background .25s
}

.toggle-input:checked~.toggle-track {
  background: rgba(124, 106, 247, .2);
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(124, 106, 247, .3)
}

.toggle-input:checked~.toggle-track .toggle-thumb {
  transform: translateX(16px);
  background: var(--accent)
}

.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: default;
  position: relative;
  overflow: hidden;
  transition: border-color .25s, transform .2s, box-shadow .25s;
  opacity: 0;
  transform: translateY(20px)
}

.module-card.entered {
  opacity: 1;
  transform: translateY(0)
}

.module-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124, 106, 247, 0), transparent);
  transition: background .3s
}

.module-card:hover {
  border-color: rgba(124, 106, 247, .35);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, .4), 0 0 0 1px rgba(124, 106, 247, .08)
}

.module-card:hover::before {
  background: linear-gradient(90deg, transparent, rgba(124, 106, 247, .5), transparent)
}

.module-card.enabled {
  border-color: rgba(124, 106, 247, .2)
}

.module-card.enabled::before {
  background: linear-gradient(90deg, transparent, rgba(124, 106, 247, .3), transparent)
}

.card-shimmer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(105deg, transparent 40%, rgba(124, 106, 247, .06) 50%, transparent 60%);
  background-size: 200% 100%;
  opacity: 0;
  transition: opacity .3s
}

.module-card.enabled .card-shimmer {
  opacity: 1;
  animation: shimmerMove 2.5s linear infinite
}

@keyframes shimmerMove {
  from {
    background-position: 200% 0
  }

  to {
    background-position: -200% 0
  }
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  background: var(--faint);
  border-radius: 2px;
  outline: 0;
  cursor: pointer
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(124, 106, 247, .2);
  transition: box-shadow .2s, transform .2s
}

input[type=range]:hover::-webkit-slider-thumb {
  box-shadow: 0 0 0 5px rgba(124, 106, 247, .3);
  transform: scale(1.15)
}

select {
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  width: 100%;
  outline: 0;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none
}

select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124, 106, 247, .15)
}

#modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .6);
  z-index: 50;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px)
}

#modal-backdrop.open {
  display: flex
}

#modal-backdrop.open #modal {
  animation: modalIn .3s cubic-bezier(.34, 1.4, .64, 1) both
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(.9) translateY(16px)
  }

  to {
    opacity: 1;
    transform: scale(1) translateY(0)
  }
}

#modal {
  background: var(--panel);
  border: 1px solid rgba(124, 106, 247, .2);
  border-radius: 18px;
  width: 100%;
  max-width: 360px;
  margin: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, .6), 0 0 0 1px rgba(124, 106, 247, .08)
}

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 100;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  max-width: 260px
}

#toast.show {
  opacity: 1;
  transform: translateY(0)
}

#cat-header {
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity .3s, transform .3s
}

#cat-header.show {
  opacity: 1;
  transform: translateX(0)
}

.icon-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  cursor: pointer;
  transition: color .15s, background .15s, transform .15s;
  background: 0 0;
  border: none
}

.icon-btn:hover {
  color: var(--text);
  background: var(--faint)
}

.icon-btn:active {
  transform: scale(.9)
}

.spinning {
  animation: spin .6s linear
}

@keyframes spin {
  to {
    transform: rotate(360deg)
  }
}

@keyframes wiggle {

  0%,
  100% {
    transform: rotate(0)
  }

  25% {
    transform: rotate(20deg)
  }

  75% {
    transform: rotate(-20deg)
  }
}

.module-card:hover .gear-icon {
  animation: wiggle .5s ease
}

.status-pill {
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  transition: background .3s, color .3s, box-shadow .3s
}

.status-pill.on {
  background: rgba(124, 106, 247, .15);
  color: var(--accent);
  box-shadow: 0 0 8px rgba(124, 106, 247, .15)
}

.status-pill.off {
  background: rgba(255, 255, 255, .04);
  color: var(--muted)
}

#module-count {
  font-size: 9px;
  letter-spacing: .08em;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  padding: 2px 7px;
  background: var(--faint);
  border-radius: 999px
}

#conn-dot {
  transition: background .4s
}

#conn-text {
  transition: color .4s
}
  </style>
</head>

<body><canvas id="bg-canvas"></canvas>
  <div id="topbar"><button id="sidebar-toggle" class="icon-btn" style="flex-shrink:0"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="1" y1="4" x2="14" y2="4" />
        <line x1="1" y1="7.5" x2="11" y2="7.5" />
        <line x1="1" y1="11" x2="14" y2="11" />
      </svg></button>
    <div style="display:flex;align-items:center;gap:9px;flex-shrink:0">
      <div class="logo-mark">Z</div>
      <div>
        <div style="font-family:Syne,sans-serif;font-weight:800;font-size:14px;color:#fff;letter-spacing:.05em;line-height:1">Zen</div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:.15em;line-height:1;margin-top:2px">WEBPANEL</div>
      </div>
    </div>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;gap:6px;margin-right:4px">
      <div id="conn-dot" style="width:6px;height:6px;border-radius:50%;background:var(--muted)"></div><span id="conn-text" style="font-size:10px;color:var(--muted);letter-spacing:.05em">connecting</span>
    </div><button class="icon-btn" onclick="onRefresh()"><svg id="refresh-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
      </svg></button>
  </div>
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar">
    <div id="sidebar-head"><span style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.2em;text-transform:uppercase">Categories</span></div>
    <ul id="category"></ul>
    <div style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0"><span style="font-size:9px;color:var(--muted);letter-spacing:.1em">ZEN v3.0 · WEBPANEL</span></div>
  </nav>
  <main style="padding:68px 20px 40px;max-width:1200px;margin:0 auto;position:relative;z-index:1">
    <div id="cat-header" style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <div style="width:2px;height:20px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px;flex-shrink:0"></div>
      <h2 id="cat-title" style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;color:#fff;margin:0;letter-spacing:.03em"></h2><span id="module-count"></span>
    </div>
    <div id="point" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px"></div>
  </main>
  <div id="modal-backdrop">
    <div id="modal">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px">Module Settings</div>
          <div id="modal-title" style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;color:#fff"></div>
        </div><button class="icon-btn" onclick="closeModal()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="1" y1="1" x2="13" y2="13" />
            <line x1="13" y1="1" x2="1" y2="13" />
          </svg></button>
      </div>
      <div id="modal-body" style="padding:16px 18px;display:flex;flex-direction:column;gap:16px;max-height:55vh;overflow-y:auto"></div>
      <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end"><button onclick="closeModal()" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;padding:7px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;font-weight:500" onmouseenter='this.style.opacity=".85"' onmouseleave='this.style.opacity="1"'>Done</button></div>
    </div>
  </div>
  <div id="toast"></div>
  <script>
function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebar-overlay").classList.add("open");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("open");
}
function onRefresh() {
  let o = document.getElementById("refresh-icon");
  o.classList.add("spinning");
  o.addEventListener("animationend", () => {
    o.classList.remove("spinning");
    location.reload();
  }, {
    once: true
  });
}
(() => {
  let e = document.getElementById("bg-canvas"), l = e.getContext("2d"), d, p, f = [];
  function o() {
    d = e.width = window.innerWidth;
    p = e.height = window.innerHeight;
  }
  function a() {
    f = [];
    for (let t = 0; t < 55; t++) f.push({
      x: Math.random() * d,
      y: Math.random() * p,
      vx: (Math.random() - .5) * .3,
      vy: (Math.random() - .5) * .3,
      r: Math.random() * 1.5 + .5
    });
  }
  o();
  a();
  (function t() {
    l.clearRect(0, 0, d, p);
    f.forEach(t => {
      t.x += t.vx;
      t.y += t.vy;
      t.x < 0 && (t.x = d);
      d < t.x && (t.x = 0);
      t.y < 0 && (t.y = p);
      p < t.y && (t.y = 0);
      l.beginPath();
      l.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      l.fillStyle = "rgba(124,106,247,0.6)";
      l.fill();
    });
    for (let n = 0; n < f.length; n++) for (let e = n + 1; e < f.length; e++) {
      var o = f[n].x - f[e].x, c = f[n].y - f[e].y, i = Math.sqrt(o * o + c * c);
      if (i < 120) {
        l.beginPath();
        l.moveTo(f[n].x, f[n].y);
        l.lineTo(f[e].x, f[e].y);
        l.strokeStyle = "rgba(124,106,247," + .12 * (1 - i / 120) + ")";
        l.lineWidth = .5;
        l.stroke();
      }
    }
    requestAnimationFrame(t);
  })();
  window.addEventListener("resize", () => {
    o();
    a();
  });
})();
document.getElementById("sidebar-toggle").onclick = () => (document.getElementById("sidebar").classList.contains("open") ? closeSidebar : openSidebar)();
let toastTimer;
function toast(t, e = false) {
  let a = document.getElementById("toast");
  a.textContent = t;
  a.style.borderColor = e ? "rgba(248,113,113,0.35)" : "var(--border)";
  a.style.color = e ? "var(--danger)" : "var(--text)";
  a.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => a.classList.remove("show"), 3e3);
}
function setConnected(t) {
  document.getElementById("conn-dot").style.background = t ? "var(--success)" : "var(--danger)";
  document.getElementById("conn-text").style.color = t ? "var(--success)" : "var(--danger)";
  document.getElementById("conn-text").textContent = t ? "connected" : "disconnected";
}
let category = "Combat", allCategories = [];
function addCategory(t) {
  let e = document.createElement("li");
  e.style.marginBottom = "2px";
  e.innerHTML = "<a href=\"#" + t + "\" class=\"nav-link\" data-cat=\"" + t + "\"><span class=\"nav-dot\"></span><span style=\"flex:1;letter-spacing:.03em\">" + t + "</span><span class=\"nav-ripple\"></span></a>";
  document.getElementById("category").appendChild(e);
  let r = e.querySelector(".nav-link");
  r.addEventListener("mousemove", t => {
    var n = r.getBoundingClientRect();
    r.style.setProperty("--rx", (t.clientX - n.left) / n.width * 100 + "%");
    r.style.setProperty("--ry", (t.clientY - n.top) / n.height * 100 + "%");
  });
}
function updateActiveNav(e) {
  document.querySelectorAll("#category .nav-link").forEach(t => t.classList.toggle("active", t.dataset.cat === e));
  let a = document.getElementById("cat-header");
  a.classList.remove("show");
  setTimeout(() => {
    document.getElementById("cat-title").textContent = e;
    a.classList.add("show");
  }, 80);
}
let moduleCache = {};
function buildCard(t, e, n, o) {
  let c = document.createElement("div");
