name: Build OpenZen

on:
  push:
    branches:
      - master
      - main
      - docs/security-audit-artifacts
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Zulu Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Generate SHA256
        shell: bash
        run: |
          sha256sum build/libs/*.jar > build/libs/OpenZen-acmuhan.sha256
          cat build/libs/OpenZen-acmuhan.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenZen-acmuhan-${{ github.sha }}
          path: |
            build/libs/*.jar
            build/libs/*.sha256

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            build/libs/*.sha256
