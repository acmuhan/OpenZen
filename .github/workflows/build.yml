name: Build OpenZen

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Upload the built artifacts to a GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      tag_name:
        description: 'Release tag to upload to when publish_release=true, e.g. v1.0.0'
        required: false

permissions:
  contents: write

jobs:
  build-jar:
    name: Build jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Zulu Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Package jar artifacts
        shell: bash
        run: |
          mkdir -p dist/jar
          cp build/libs/*.jar dist/jar/
          sha256sum dist/jar/*.jar > dist/jar/OpenZen-acmuhan-jar.sha256
          cat dist/jar/OpenZen-acmuhan-jar.sha256
          {
            echo "## OpenZen jar artifacts"
            echo ""
            echo "Action 页面下方的 Artifacts 区域会显示并可下载："
            echo "- OpenZen-acmuhan-jar"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Action page jar artifact
        if: always() && hashFiles('dist/jar/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: OpenZen-acmuhan-jar
          path: dist/jar/*
          if-no-files-found: error
          retention-days: 30

  build-native-windows:
    name: Build Windows DLL loader
    runs-on: windows-2022
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      VCPKG_ROOT: C:/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.temp }}/vcpkg-bincache
      VCPKG_FEATURE_FLAGS: binarycaching

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Zulu Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Show native build environment
        shell: pwsh
        run: |
          Write-Host "JAVA_HOME=$env:JAVA_HOME"
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          Write-Host "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_DEFAULT_BINARY_CACHE"
          Write-Host "CMAKE_BUILD_PARALLEL_LEVEL=$env:CMAKE_BUILD_PARALLEL_LEVEL"
          cmake --version
          where.exe cmake
          where.exe ninja || Write-Host "ninja not found on PATH; Visual Studio generator will be used by Gradle"
          if ($env:VCPKG_ROOT -and (Test-Path $env:VCPKG_ROOT)) {
            & "$env:VCPKG_ROOT/vcpkg.exe" version
            & "$env:VCPKG_ROOT/vcpkg.exe" x-package-info qtbase:x64-windows-static --x-json | Select-Object -First 80
          }

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: openzen-vcpkg-bin-${{ runner.os }}-${{ hashFiles('native/vcpkg.json') }}
          restore-keys: |
            openzen-vcpkg-bin-${{ runner.os }}-

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: openzen-vcpkg-installed-${{ runner.os }}-${{ hashFiles('native/vcpkg.json') }}
          restore-keys: |
            openzen-vcpkg-installed-${{ runner.os }}-

      - name: Cache CMake build tree
        uses: actions/cache@v4
        with:
          path: native/build
          key: openzen-cmake-${{ runner.os }}-${{ hashFiles('native/**/*.txt', 'native/**/*.cmake', 'native/vcpkg.json', 'native/**/*.cpp', 'native/**/*.h', 'native/**/*.rc') }}
          restore-keys: |
            openzen-cmake-${{ runner.os }}-

      - name: Configure native CMake project
        shell: cmd
        run: gradlew.bat configureNative --no-daemon --stacktrace --info

      - name: Build native DLL and loader
        shell: cmd
        run: gradlew.bat buildNative --no-daemon --stacktrace --info

      - name: Package native distribution
        shell: cmd
        run: gradlew.bat packageDist --no-daemon --stacktrace --info

      - name: Package native artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/native | Out-Null

          $artifacts = @()
          if (Test-Path build/dist) {
            $artifacts += Get-ChildItem -Path build/dist -File -ErrorAction SilentlyContinue
          }
          if ($artifacts.Count -eq 0) {
            $artifacts += Get-ChildItem -Path build,native/build -Recurse -File -Include *.exe,*.dll -ErrorAction SilentlyContinue
          }
          if ($artifacts.Count -eq 0) {
            Write-Error "No native artifacts found. Diagnostic file listing follows."
            Get-ChildItem -Path build,native/build -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 200 FullName,Length | Format-Table -AutoSize
            exit 1
          }

          $artifacts | ForEach-Object {
            Write-Host "Copying $($_.FullName)"
            Copy-Item -LiteralPath $_.FullName -Destination dist/native -Force
          }

          Get-ChildItem -Path dist/native -File | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "$($hash.Hash.ToLower())  $($_.Name)"
          } | Set-Content -Path dist/native/OpenZen-acmuhan-native.sha256 -Encoding ascii

          Get-Content dist/native/OpenZen-acmuhan-native.sha256
          @"
          ## OpenZen native artifacts

          Action 页面下方的 Artifacts 区域会显示并可下载：
          - OpenZen-acmuhan-native-windows

          该产物包含新版上游的 Windows DLL 注入 Loader：OpenZenLoader.exe。
          "@ >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Action page native artifact
        if: always() && hashFiles('dist/native/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: OpenZen-acmuhan-native-windows
          path: dist/native/*
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs:
      - build-jar
      - build-native-windows
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || inputs.publish_release == 'true')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        shell: bash
        run: |
          find release-assets -type f -maxdepth 2 -print
          {
            echo "## OpenZen release assets"
            echo ""
            echo "Release 将上传本次 workflow 生成的 jar 与 Windows Loader 产物。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name || github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
