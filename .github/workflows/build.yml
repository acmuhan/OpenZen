name: Build OpenZen

on:
  push:
    branches:
      - master
      - main
      - docs/security-audit-artifacts
    tags:
      - 'v*'
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Upload the built jar to a GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      tag_name:
        description: 'Release tag to upload to when publish_release=true, e.g. v1.0.0'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Zulu Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Package Action artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp build/libs/*.jar dist/
          sha256sum dist/*.jar > dist/OpenZen-acmuhan.sha256
          cat dist/OpenZen-acmuhan.sha256
          {
            echo "## OpenZen build artifacts"
            echo ""
            echo "Action 页面下方的 Artifacts 区域会显示并可下载："
            echo "- OpenZen-acmuhan-jar"
            echo ""
            echo "Release tag 构建时同一份 dist 产物也会上传到 Release。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Action page artifact
        if: always() && hashFiles('dist/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: OpenZen-acmuhan-jar
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
